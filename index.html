<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalculator</title>
    <link rel="icon" href="Calculator.png" type="image/png">
    <meta name="description" content="A premium calculator web application with basic and age calculation modes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/calculator.css">
    <link rel="stylesheet" href="css/age-calculator.css">
    <link rel="stylesheet" href="css/tip-calculator.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="app-container">
        
        <!-- Global Navigation -->
        <div class="tabs-container global-tabs" role="tablist">
            <div class="tab-indicator" id="tab-indicator"></div>
            <button class="tab-btn active" id="tab-basic" role="tab" aria-selected="true" aria-controls="panel-basic">Basic</button>
            <button class="tab-btn" id="tab-age" role="tab" aria-selected="false" aria-controls="panel-age">Age</button>
            <button class="tab-btn" id="tab-tip" role="tab" aria-selected="false" aria-controls="panel-tip">Tip</button>
        </div>

        <div class="calculator-wrapper">
            <!-- Main Calculator Card -->
            <section class="calculator-card" aria-label="Calculator Tool"> 
                
                <!-- App Controls -->
                <header class="settings-bar" style="justify-content: flex-end;">
                    
                    <div class="settings-toggles">
                        <button class="settings-btn" id="toggle-history" aria-label="Toggle History" title="History">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                        </button>
                        <button class="settings-btn" id="toggle-format" aria-label="Toggle Number Format" title="Number Formatting: ON">
                            <span class="format-icon-text">1,0</span>
                        </button>
                        <button class="settings-btn" id="toggle-sound" aria-label="Toggle Sound" title="Sound: ON">
                            <svg class="sound-on-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                            <svg class="sound-off-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                        </button>
                        <button class="settings-btn" id="toggle-theme" aria-label="Toggle dark/light mode" title="Theme">
                            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        </button>
                    </div>
                </header>

                <div class="view-container">
                    <!-- Basic Calculator View -->
                    <div class="view-panel active" id="panel-basic" role="tabpanel" aria-labelledby="tab-basic">
                        <!-- Screen Area -->
                        <div class="calc-screen" id="calc-screen">
                            <div class="status-indicators" id="status-indicators"></div>
                            
                            <button class="copy-btn" id="copy-btn" aria-label="Copy result" title="Copy to clipboard">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </button>

                            <div class="calc-history-expr" id="calc-history-expr" aria-hidden="true"></div>
                            <div class="calc-current" id="calc-current" aria-live="polite">0</div>
                        </div>
                        
                        <!-- Keypad Area -->
                        <div class="calc-keypad">
                            <button class="btn btn-action" data-action="clear" aria-label="Clear All"><span>AC</span></button>
                            <button class="btn btn-action" data-action="toggle-sign" aria-label="Toggle Sign"><span>±</span></button>
                            <button class="btn btn-action" data-action="percentage" aria-label="Percentage"><span>%</span></button>
                            <button class="btn btn-operator" data-action="operator" data-value="÷" aria-label="Divide"><span>÷</span></button>
                            
                            <button class="btn btn-number" data-value="7"><span>7</span></button>
                            <button class="btn btn-number" data-value="8"><span>8</span></button>
                            <button class="btn btn-number" data-value="9"><span>9</span></button>
                            <button class="btn btn-operator" data-action="operator" data-value="×" aria-label="Multiply"><span>×</span></button>
                            
                            <button class="btn btn-number" data-value="4"><span>4</span></button>
                            <button class="btn btn-number" data-value="5"><span>5</span></button>
                            <button class="btn btn-number" data-value="6"><span>6</span></button>
                            <button class="btn btn-operator" data-action="operator" data-value="−" aria-label="Subtract"><span>−</span></button>
                            
                            <button class="btn btn-number" data-value="1"><span>1</span></button>
                            <button class="btn btn-number" data-value="2"><span>2</span></button>
                            <button class="btn btn-number" data-value="3"><span>3</span></button>
                            <button class="btn btn-operator" data-action="operator" data-value="+" aria-label="Add"><span>+</span></button>
                            
                            <button class="btn btn-action" data-action="delete" aria-label="Delete"><span>⌫</span></button>
                            <button class="btn btn-number" data-value="0"><span>0</span></button>
                            <button class="btn btn-number" data-value="."><span>.</span></button>
                            <button class="btn btn-equals accent" data-action="equals" aria-label="Equals"><span>=</span></button>
                        </div>
                    </div>

                    <!-- Age Calculator View -->
                    <div class="view-panel" id="panel-age" role="tabpanel" aria-labelledby="tab-age">
                        <div class="age-form">
                            <div class="input-group">
                                <label for="dob-input">Date of Birth</label>
                                <div class="date-input-wrapper">
                                    <input type="date" id="dob-input" aria-label="Date of Birth" required>
                                </div>
                                <span class="validation-message" id="dob-error"></span>
                            </div>

                            <div class="age-actions">
                                <button class="btn btn-action" id="age-reset" aria-label="Reset Date"><span>Reset</span></button>
                                <button class="btn btn-equals accent" id="age-calculate" aria-label="Calculate Age"><span>Calculate Age</span></button>
                            </div>
                        </div>

                        <div class="age-result-container hidden" id="age-result-container">
                            <div class="age-main-result">
                                <h4>Age</h4>
                                <div class="age-values" id="age-primary-output">
                                    <span class="age-num" id="age-years">0</span> <span class="age-label">Years</span>
                                    <span class="age-num" id="age-months">0</span> <span class="age-label">Months</span>
                                    <span class="age-num" id="age-days">0</span> <span class="age-label">Days</span>
                                </div>
                            </div>
                            
                            <div class="birthday-status" id="birthday-status">
                                <!-- e.g. "🎉 Today is your birthday!" -->
                            </div>

                            <div class="age-stats">
                                <h4>Statistics</h4>
                                <div class="stats-grid">
                                    <div class="stat-box">
                                        <div class="stat-label">Total Years</div>
                                        <div class="stat-value" id="stat-years">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Months</div>
                                        <div class="stat-value" id="stat-months">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Weeks</div>
                                        <div class="stat-value" id="stat-weeks">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Days</div>
                                        <div class="stat-value" id="stat-days">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Hours</div>
                                        <div class="stat-value" id="stat-hours">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Minutes</div>
                                        <div class="stat-value" id="stat-minutes">0</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Seconds</div>
                                        <div class="stat-value" id="stat-seconds">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tip Calculator View -->
                    <div class="view-panel" id="panel-tip" role="tabpanel" aria-labelledby="tab-tip">
                        <div class="tip-form">
                            <div class="input-group">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <label for="bill-input">Bill Amount</label>
                                    <button class="settings-btn" id="tip-reset" aria-label="Reset Calculator" title="Reset" style="width: 24px; height: 24px;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    </button>
                                </div>
                                <div class="bill-input-wrapper">
                                    <span class="currency-symbol">₹</span>
                                    <input type="text" inputmode="decimal" id="bill-input" aria-label="Bill Amount" placeholder="0.00">
                                </div>
                                <span class="validation-message" id="bill-error"></span>
                            </div>

                            <div class="input-group">
                                <label>Tip Percentage (<span id="tip-display">10</span>%)</label>
                                <div class="quick-tips" id="quick-tips">
                                    <button class="tip-chip" data-tip="5">5%</button>
                                    <button class="tip-chip active" data-tip="10">10%</button>
                                    <button class="tip-chip" data-tip="15">15%</button>
                                    <button class="tip-chip" data-tip="18">18%</button>
                                    <button class="tip-chip" data-tip="20">20%</button>
                                    <button class="tip-chip" data-tip="25">25%</button>
                                </div>
                                <input type="range" id="tip-slider" min="0" max="100" value="10" aria-label="Tip Percentage">
                            </div>

                            <div class="input-group">
                                <label for="people-input">Number of People</label>
                                <div class="stepper-wrapper">
                                    <button class="stepper-btn" id="people-minus" aria-label="Decrease people">−</button>
                                    <input type="number" id="people-input" aria-label="Number of People" value="1" min="1" step="1">
                                    <button class="stepper-btn" id="people-plus" aria-label="Increase people">+</button>
                                </div>
                                <span class="validation-message" id="people-error"></span>
                            </div>

                        </div>

                        <div class="tip-result-container hidden" id="tip-result-container">
                            <div class="tip-main-result">
                                <h4>Each Person Pays</h4>
                                <div class="tip-values">
                                    <span class="tip-num" id="tip-each-pays">₹0.00</span>
                                </div>
                            </div>
                            
                            <div class="tip-stats">
                                <div class="stats-grid">
                                    <div class="stat-box">
                                        <div class="stat-label">Tip Amount</div>
                                        <div class="stat-value" id="stat-tip-amount">₹0.00</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Total Bill</div>
                                        <div class="stat-value" id="stat-total-bill">₹0.00</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Per Person Tip</div>
                                        <div class="stat-value" id="stat-per-person-tip">₹0.00</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Panel (Basic Calculator only) -->
            <aside class="history-panel" id="history-panel">
                <header class="history-header">
                    <h3>History</h3>
                    <button class="history-clear-btn" id="history-clear-btn" aria-label="Clear History" title="Clear History">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </header>
                <div class="history-list" id="history-list">
                    <div class="history-empty">No history yet</div>
                </div>
            </aside>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </main>
    
    <!-- ES6 Module Entry Point -->
    <script type="module" src="js/app.js?v=2"></script>
</body>
</html>
